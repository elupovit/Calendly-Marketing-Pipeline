name: CI & Deploy (SAM)

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "dev", "main" ]

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Lint
        run: pylint lambdas || true
      - name: Run Tests
        run: pytest -q

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: ci
    name: SAM Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install SAM CLI into runner
      - name: Install SAM CLI
        uses: aws-actions/setup-sam@v2

      # Configure AWS credentials (from GitHub Secrets)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Validate SAM template
      - name: SAM Validate
        run: sam validate --lint

      # Build (packages Lambda code, prepares CloudFormation)
      - name: SAM Build
        run: sam build --use-container

      # Deploy to AWS
      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name calendly-pipeline \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --no-confirm-changeset \
            --resolve-s3 \
            --parameter-overrides EmrReleaseLabel=${{ 
secrets.EMR_RELEASE_LABEL }} BronzePrefix=bronze/calendly_raw 
StackNamePrefix=calendly


